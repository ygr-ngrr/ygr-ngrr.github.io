<title>📝 更新履歴 — 夜霧流るる</title>

<style>
  :root {
    --bg: #F8F6FF;
    --card: #FFFFFF;
    --accent: #A8C4F0;
    --accent2: #E8A0BF;
    --accent3: #C4A8E0;
    --accent4: #B8D4F0;
    --text: #4A4458;
    --text-light: #8E849E;
    --text-dark: #2E2440;
    --border: #E8E0F0;
    --shadow: 0 2px 20px rgba(93, 78, 96, 0.08);
    --shadow-hover: 0 8px 30px rgba(93, 78, 96, 0.15);
    --radius: 16px;
  }

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
background-color: #F8F6FF;
color-scheme: light only;
scroll-behavior: smooth;
}

body {
font-family: 'Zen Maru Gothic', 'Klee One', sans-serif;
background: var(--bg);
color: var(--text);
line-height: 1.8;
overflow-x: hidden;
}

/* ===== CONTAINER ===== */
.container {
max-width: 800px;
margin: 0 auto;
padding: 20px 16px 60px;
}

/* ===== PAGE HEADER ===== */
.page-header {
text-align: center;
padding: 60px 20px 20px;
}

.page-header .back-link {
display: inline-block;
text-decoration: none;
font-size: 13px;
color: var(--text-light);
margin-bottom: 16px;
transition: color 0.2s;
}
.page-header .back-link:hover { color: var(--accent2); }

.page-header h1 {
font-family: 'Klee One', serif;
font-size: clamp(22px, 4vw, 30px);
font-weight: 600;
color: var(--text-dark);
margin-bottom: 4px;
}

.page-header p {
font-size: 13px;
color: var(--text-light);
}

/* ===== SECTION ===== */
.section {
margin-bottom: 40px;
}

.section-title {
font-family: 'Klee One', serif;
font-size: 20px;
font-weight: 600;
color: var(--text-dark);
margin-bottom: 16px;
padding-left: 4px;
display: flex;
align-items: center;
gap: 8px;
}

.section-title span {
font-size: 22px;
}

/* ===== PINNED NOTICE ===== */
.pinned-notice {
background: var(--card);
border: 1.5px solid var(--accent);
border-radius: var(--radius);
padding: 14px 18px;
margin-bottom: 20px;
box-shadow: var(--shadow);
}

.pinned-label {
font-size: 11px;
font-weight: 700;
color: var(--accent);
margin-bottom: 4px;
letter-spacing: 0.03em;
}

.pinned-text {
font-size: 14px;
line-height: 1.7;
}

/* ===== TIMELINE ===== */
.timeline {
position: relative;
padding-left: 24px;
}

.timeline::before {
content: '';
position: absolute;
left: 6px;
top: 4px;
bottom: 4px;
width: 2px;
background: linear-gradient(to bottom, var(--accent), var(--accent2), var(--accent3));
border-radius: 2px;
}

.timeline-item {
position: relative;
padding: 0 0 20px 16px;
}

.timeline-item::before {
content: '';
position: absolute;
left: -21px;
top: 6px;
width: 10px;
height: 10px;
border-radius: 50%;
background: var(--accent);
border: 2px solid var(--bg);
}

.timeline-item:nth-child(3n+2)::before { background: var(--accent2); }
.timeline-item:nth-child(3n+3)::before { background: var(--accent3); }

.timeline-date {
font-size: 11px;
color: var(--text-light);
}

.timeline-content {
font-size: 14px;
background: var(--card);
border: 1.5px solid var(--border);
border-radius: 12px;
padding: 12px 16px;
margin-top: 4px;
box-shadow: var(--shadow);
}

.timeline-tag {
display: inline-block;
font-size: 10px;
padding: 1px 8px;
border-radius: 100px;
margin-right: 6px;
}
.tag-new { background: #E3F2FD; color: #1565C0; }
.tag-rank { background: #FFF8E1; color: #F57F17; }
.tag-complete { background: #E8F5E9; color: #2E7D32; }
.tag-sale { background: #FCE4EC; color: #C62828; }
.tag-notice { background: #E8F5E9; color: #2E7D32; }

/* ===== LOADING / ERROR ===== */
.updates-loading {
text-align: center;
padding: 40px 0;
color: var(--text-light);
font-size: 13px;
}

.updates-error {
text-align: center;
padding: 24px;
color: var(--text-light);
font-size: 13px;
background: var(--card);
border: 1.5px solid var(--border);
border-radius: var(--radius);
}

/* ===== FOOTER ===== */
footer {
text-align: center;
padding: 40px 20px;
font-size: 12px;
color: var(--text-light);
border-top: 1px solid var(--border);
}

/* ===== ANIMATIONS ===== */
.fade-in {
opacity: 0;
transform: translateY(20px);
animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
to { opacity: 1; transform: translateY(0); }
}

/* ===== HAMBURGER MENU ===== */
.menu-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 2px 12px rgba(74, 68, 88, 0.1);
}
.menu-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 16px rgba(74, 68, 88, 0.15);
}
.menu-btn.open {
  background: var(--text-dark);
  border-color: var(--text-dark);
}
.menu-btn-icon {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 18px;
  transition: all 0.3s;
}
.menu-btn-icon span {
  display: block;
  height: 2px;
  width: 100%;
  background: var(--text-dark);
  border-radius: 2px;
  transition: all 0.3s;
}
.menu-btn.open .menu-btn-icon span { background: white; }
.menu-btn.open .menu-btn-icon span:nth-child(1) {
  transform: rotate(45deg) translate(4px, 4px);
}
.menu-btn.open .menu-btn-icon span:nth-child(2) { opacity: 0; }
.menu-btn.open .menu-btn-icon span:nth-child(3) {
  transform: rotate(-45deg) translate(4px, -4px);
}

.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(248, 246, 255, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.menu-content {
  text-align: center;
  transform: translateY(15px);
  transition: transform 0.35s ease;
}
.menu-overlay.open .menu-content {
  transform: translateY(0);
}

.menu-site-name {
  font-family: 'Klee One', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 28px;
}

.menu-group {
  margin-bottom: 24px;
}
.menu-group-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-light);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.menu-link {
  display: block;
  text-decoration: none;
  font-family: 'Klee One', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-dark);
  padding: 10px 0;
  transition: color 0.2s;
}
.menu-link:hover { color: var(--accent2); }
.menu-link-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-light);
  font-family: 'Zen Maru Gothic', sans-serif;
}

.menu-external {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.menu-ext-link {
  text-decoration: none;
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  background: var(--card);
  border: 1.5px solid var(--border);
  transition: all 0.2s;
}
.menu-ext-link:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
</style>
</head>

<script>
function toggleMenu() {
  document.querySelector('.menu-btn').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
  document.body.style.overflow = document.getElementById('menuOverlay').classList.contains('open') ? 'hidden' : '';
}
function closeMenuOnBg(e) {
  if (e.target === document.getElementById('menuOverlay')) toggleMenu();

  <a href="index.html" class="back-link">← トップへ戻る</a>

  <p>お知らせとこれまでの更新をまとめています</p>
</div>

<div class="container">
  <div id="updates-container">
    <div class="updates-loading">更新履歴を読み込んでいます…</div>
  </div>
</div>

  © 2026 夜霧流るる / きりしま

<script>
// ★ ここにGAS Web AppのURLを入力してください
var UPDATES_API_URL = "https://script.google.com/macros/s/AKfycbx_69JpottyQ7psYk4-nsIT1jNVYEOrfm6jNiloByLgLD3lfaGJ6NKpY4M8Xge7k3jMlQ/exec";

// 種別 → タグのCSSクラスとラベル
var TAG_MAP = {
  "新話投稿": { cls: "tag-new",      label: "新話投稿" },
  "ランクイン": { cls: "tag-rank",    label: "ランクイン" },
  "お知らせ":   { cls: "tag-notice",  label: "お知らせ" },
  "完結":       { cls: "tag-complete", label: "完結" },
  "販売開始":   { cls: "tag-sale",    label: "販売開始" },
};

(async function loadUpdates() {
  var container = document.getElementById("updates-container");

  try {
    var res = await fetch(UPDATES_API_URL);
    if (!res.ok) throw new Error("API error: " + res.status);

    var data = await res.json();
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="updates-error">更新履歴がありません</div>';
      return;
    }

    // ピン留めとそれ以外に分離
    var pinned = data.filter(function(item) { return item.pinned; });
    var regular = data.filter(function(item) { return !item.pinned; });

    var html = "";

    // ピン留めお知らせ
    pinned.forEach(function(item) {
      var dateStr = formatDate(item.date);
      html += '<div class="pinned-notice fade-in">'
        + '<div class="pinned-label">📌 お知らせ　' + escapeHtml(dateStr) + '</div>'
        + '<div class="pinned-text">' + escapeHtml(item.content) + '</div>'
        + '</div>';
    });

    // タイムライン
    if (regular.length > 0) {
      html += '<div class="timeline fade-in">';
      regular.forEach(function(item) {
        var dateStr = formatDate(item.date);
        var tag = TAG_MAP[item.type] || { cls: "tag-notice", label: item.type };
        html += '<div class="timeline-item">'
          + '<div class="timeline-date">' + escapeHtml(dateStr) + '</div>'
          + '<div class="timeline-content">'
          + '<span class="timeline-tag ' + tag.cls + '">' + escapeHtml(tag.label) + '</span>'
          + escapeHtml(item.content)
          + '</div>'
          + '</div>';
      });
      html += '</div>';
    }

    container.innerHTML = html;

  } catch (err) {
    console.error("Updates load error:", err);
    container.innerHTML = '<div class="updates-error">更新履歴の読み込みに失敗しました</div>';
  }
})();

function formatDate(dateStr) {
  if (!dateStr) return "";
  var parts = dateStr.split("-");
  if (parts.length === 3) {
    return parts[0] + "." + parts[1] + "." + parts[2];
  }
  return dateStr;
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}
</script>
